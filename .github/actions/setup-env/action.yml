name: Setup env
description: Setup development environment for CI workflows

inputs:
  registry-url:
    # ref: https://github.com/actions/setup-node/blob/1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a/action.yml#L18C5-L18C176
    description: "Optional registry to set up for auth. Will set the registry in a project level .npmrc and .yarnrc file, and set up auth to read in from env.NODE_AUTH_TOKEN."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup vite-plus
      uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
      with:
        run-install: false

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Get bun store path
      id: bun-store
      shell: bash
      run: echo "store_path=$HOME/.bun-install-cache" >> "$GITHUB_OUTPUT"

    - name: Restore bun cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.bun-store.outputs.store_path }}
        key: ${{ runner.os }}-bun-store-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-store-

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile
      env:
        BUN_INSTALL_CACHE_DIR: ${{ steps.bun-store.outputs.store_path }}

    - name: Save bun cache if main branch
      if: github.ref_name == 'main'
      id: save-bun-cache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.bun-store.outputs.store_path }}
        key: ${{ runner.os }}-bun-store-${{ hashFiles('**/bun.lock') }}
