name: Setup Bun
description: Setup Bun

inputs:
  bun-version-file:
    description: "Path to a file containing the Bun version to use. If not set, defaults to '.bun-version'."
    required: false
    default: ".bun-version"
  bun-version:
    description: "Details the Bun version to use. If not set, it will read from the file specified in 'bun-version-file'."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Bun with bun version
      if: ${{ inputs.bun-version != '' }}
      id: setup-bun-with-version
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Setup Bun with bun version file
      if: ${{ steps.setup-bun-with-version.outcome == 'skipped' }}
      id: setup-bun-with-version-file
      uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
      with:
        bun-version-file: ${{ inputs.bun-version-file }}

    - name: Get bun store path
      id: bun-store
      shell: bash
      run: echo "store_path=$HOME/.bun-install-cache" >> "$GITHUB_OUTPUT"

    - name: Restore bun cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.bun-store.outputs.store_path }}
        key: ${{ runner.os }}-bun-store-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-store-

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile
      env:
        BUN_INSTALL_CACHE_DIR: ${{ steps.bun-store.outputs.store_path }}

    - name: Save bun cache if main branch
      if: github.ref_name == 'main'
      id: save-bun-cache
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ${{ steps.bun-store.outputs.store_path }}
        key: ${{ runner.os }}-bun-store-${{ hashFiles('**/bun.lock') }}
